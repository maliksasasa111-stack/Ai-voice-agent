<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightside Ai - Continuous Live Call</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #FFFFFF;
            color: #333333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 2px solid #FFF0E6;
        }
        h1 { color: #FF6B00; margin-bottom: 5px; font-size: 2.5rem; }
        p { color: #666666; margin-top: 0; margin-bottom: 25px; }
        .status {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 20px 0;
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .listening { background-color: #E6F9ED; color: #10B981; }
        .thinking { background-color: #FFF0E6; color: #FF6B00; }
        .speaking { background-color: #EBF5FF; color: #3B82F6; }
        .transcript-box {
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            padding: 15px;
            border-radius: 8px;
            min-height: 50px;
            text-align: left;
            font-size: 0.95rem;
            margin-top: 20px;
        }
        .key-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #E5E7EB;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .start-btn {
            background-color: #FF6B00;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            display: none;
        }
        .start-btn:hover {
            background-color: #e05e00;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🍊 Nightside Ai</h1>
    <p>Continuous Live Voice Agent</p>
    
    <input type="password" id="groqApiKey" class="key-input" placeholder="Paste your Groq API Key here...">
    <button id="startCallBtn" class="start-btn">🟢 START LIVE CALL</button>
    
    <div id="statusBox" class="status thinking" style="background-color: #F3F4F6; color: #6B7280;">🔴 Enter Key To Load System</div>
    
    <div class="transcript-box">
        <strong>You said:</strong> <span id="userText">...</span>
    </div>
    <div class="transcript-box">
        <strong>Agent response:</strong> <span id="agentText">...</span>
    </div>
</div>

<script>
    const statusBox = document.getElementById('statusBox');
    const userTextSpan = document.getElementById('userText');
    const agentTextSpan = document.getElementById('agentText');
    const apiKeyInput = document.getElementById('groqApiKey');
    const startCallBtn = document.getElementById('startCallBtn');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Please use Google Chrome or Microsoft Edge for this app.");
    }
    
    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = 'en-US';

    let isSpeaking = false;
    let systemActive = false;

    // Show button once key is entered
    apiKeyInput.addEventListener('input', () => {
        if(apiKeyInput.value.trim() !== "") {
            startCallBtn.style.display = "block";
            statusBox.innerText = "👉 Click START LIVE CALL Button";
            statusBox.className = "status thinking";
        } else {
            startCallBtn.style.display = "none";
        }
    });

    // Handle Start Call (Bypasses Browser Security Restrictions)
    startCallBtn.addEventListener('click', () => {
        systemActive = true;
        startCallBtn.style.display = "none";
        apiKeyInput.style.display = "none";
        
        // Trigger empty speech synthesis to unlock audio engine
        const unlockUtterance = new SpeechSynthesisUtterance("");
        window.speechSynthesis.speak(unlockUtterance);
        
        // Start Listening
        recognition.start();
        speakLive("Hello! Welcome to Nightside Ai. How can I help you today?");
    });

    recognition.onstart = () => {
        if (!isSpeaking && systemActive) {
            statusBox.innerText = "🟢 Continuous Mic Live - Speak Now";
            statusBox.className = "status listening";
        }
    };

    recognition.onresult = async (event) => {
        if (isSpeaking || !systemActive) return;

        const transcript = event.results[event.results.length - 1][0].transcript;
        userTextSpan.innerText = transcript;
        
        const apiKey = apiKeyInput.value.trim();

        recognition.stop();
        isSpeaking = true;
        statusBox.innerText = "⚡ Agent is thinking...";
        statusBox.className = "status thinking";

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [
                        { role: "system", content: "You are a live conversational voice agent for Nightside Ai software agency. Keep responses extremely brief, under 12 words. Speak directly and naturally like a human over a phone call. Do not use asterisks or markdown format." },
                        { role: "user", content: transcript }
                    ]
                })
            });

            const data = await response.json();
            const reply = data.choices[0].message.content;
            agentTextSpan.innerText = reply;

            speakLive(reply);

        } catch (error) {
            console.error(error);
            statusBox.innerText = "❌ Error processing request";
            isSpeaking = false;
            recognition.start();
        }
    };

    function speakLive(text) {
        statusBox.innerText = "🔊 Agent is speaking...";
        statusBox.className = "status speaking";

        const utterance = new SpeechSynthesisUtterance(text);
        
        // Force fully natural default voice allocation
        const voices = window.speechSynthesis.getVoices();
        if(voices.length > 0) {
            // Tries to pick a nice English voice if available
            const englishVoice = voices.find(v => v.lang.includes('en-US') || v.lang.includes('en-GB'));
            if(englishVoice) utterance.voice = englishVoice;
        }

        utterance.onend = () => {
            isSpeaking = false;
            statusBox.innerText = "🟢 Continuous Mic Live - Speak Now";
            statusBox.className = "status listening";
            if (systemActive) recognition.start();
        };

        window.speechSynthesis.speak(utterance);
    }

    recognition.onend = () => {
        if (!isSpeaking && systemActive) {
            recognition.start();
        }
    };
</script>

</body>
</html>
